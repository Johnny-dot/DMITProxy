; DMITProxy minimal subconverter template.
;
; Why this exists: the standard ACL4SSR_Online_Full template assumes nodes
; carry region tags in their names (HK01, US-LA, 🇸🇬 SG-2, etc.) and uses
; regex filters to extract them into ~25 regional sub-groups. Our nodes are
; named after the 3X-UI client email (alice@example.com / bob_user / ...)
; with no region info, so every regional sub-group ends up empty. Mihomo
; then falls back to DIRECT for traffic routed through those groups, which
; manifests as "proxy stopped working — I see my own IP".
;
; This template instead ships a single PROXY group containing every node,
; an `auto` url-test sibling for the user to opt into, and Loyalsoldier's
; rule lists for LAN/CN bypass and ad blocking. Everything else falls
; through to MATCH,PROXY.
;
; Served at GET /sub/_template/dmit-default.ini (loopback only) so the
; co-located subconverter sidecar can fetch it.

[custom]
enable_rule_generator=true
overwrite_original_rules=true
add_emoji=false
remove_emoji=true
clash_use_new_field_name=true

[clash_proxy_group]
PROXY`select`auto`.*`DIRECT
auto`url-test`.*`http://www.gstatic.com/generate_204`300

[ruleset]
DIRECT,[]DOMAIN-SUFFIX,local
DIRECT,[]DOMAIN-SUFFIX,localhost
DIRECT,[]IP-CIDR,127.0.0.0/8,no-resolve
DIRECT,[]IP-CIDR,10.0.0.0/8,no-resolve
DIRECT,[]IP-CIDR,172.16.0.0/12,no-resolve
DIRECT,[]IP-CIDR,192.168.0.0/16,no-resolve
REJECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/reject.txt,86400
DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/private.txt,86400
DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/direct.txt,86400
PROXY,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/proxy.txt,86400
DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/cncidr.txt,86400
DIRECT,https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/lancidr.txt,86400
DIRECT,[]GEOIP,CN
PROXY,[]MATCH
